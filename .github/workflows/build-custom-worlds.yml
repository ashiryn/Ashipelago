# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: unittests

on:
  push:

  pull_request:
    types: [opened, edited]
    #branches: ["ashipelago"]

jobs:
  hosting:
    runs-on: ubuntu-latest
    name: Building custom .apworlds for Ashipelago

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12.6
      uses: actions/setup-python@v5
      with:
        python-version: 3.12.6
    - name: Check if custom .apworlds need building
      if: startsWith(github.event.pull_request.title, 'Worlds/') == false
      run: |
        echo "Not a worlds update, skipping .apworld building"
    - name: Create Release
      uses: softprops/action-gh-release@v2.5.0
      with:
        draft: true
        prerelease: false
        name: github.event.pull_request.title
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        python -m pip install --upgrade pip
        python ModuleUpdate.py --yes --force --append "WebHostLib/requirements.txt"
    - name: Build APWorlds
      run: |
        source venv/bin/activate
        export PYTHONPATH=$(pwd)
        timeout 600 python Launcher.py "Build APWorlds"
    - name: Add to Release
      uses: softprops/action-gh-release@v2.5.0
      with:
        draft: true
        prerelease: false
        name: github.event.pull_request.title
        files: |
          build/apworlds/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
